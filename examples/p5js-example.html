<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TL Gen Art — p5.js example</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #111;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      canvas {
        display: block;
        box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
      }
    </style>

    <!--
      Load order is determinism-critical:
        1. p5 (provides the global draw helpers)
        2. art.js (sets window.$art and seeds synchronously at load)
        3. the sketch below (consumes $art, which is already ready)
    -->
    <script src="../lib/p5.min.js"></script>
    <script src="../art.js"></script>
  </head>
  <body>
    <script>
      // ---- Palettes (named so the trait value is human-readable) ----
      const PALETTES = [
        { name: "Sunset",  bg: "#1a1423", colors: ["#ff6b6b", "#ffd93d", "#ff8e53", "#c44d56", "#f4e8c1"] },
        { name: "Lagoon",  bg: "#06141b", colors: ["#0fa3b1", "#b5e2fa", "#f9f7f3", "#eddea4", "#f7a072"] },
        { name: "Orchard", bg: "#1b1f17", colors: ["#a3b18a", "#588157", "#3a5a40", "#dad7cd", "#e9c46a"] },
        { name: "Neon",    bg: "#0d0221", colors: ["#ff2a6d", "#05d9e8", "#d1f7ff", "#7700ff", "#fef9ef"] },
        { name: "Ember",   bg: "#0b0a07", colors: ["#fb8b24", "#e36414", "#9a031e", "#5f0f40", "#ffba08"] },
      ];

      const SHAPES = ["rect", "ellipse", "triangle"];
      const SIZE = 800;

      // Choices recorded during draw, then emitted as traits afterward.
      let chosen = {};

      function setup() {
        // Seed ONCE, before any drawing. tokenId + blockhash are always included and the default.
        // Add seeding from the minter by uncommenting the next line.
        // If you add a `seed=1234` query param, it overrides everything
        // $art.seedFrom("minter");
        console.log("$art seed:", $art.getSeed());

        createCanvas(SIZE, SIZE);
        noLoop(); // static composition -> draw() runs exactly once
      }

      function draw() {
        // ---- structural choices, all from the seeded stream ----
        const palette = $art.randomElement(PALETTES);
        const grid = $art.randomInt(4, 9); // cells per side, inclusive
        const cell = SIZE / grid;

        background(palette.bg);
        noStroke();
        rectMode(CENTER);

        // ---- grid of shapes; call order here defines the output ----
        for (let gy = 0; gy < grid; gy++) {
          for (let gx = 0; gx < grid; gx++) {
            if (!$art.randomBool(0.82)) continue; // some cells stay empty

            const cx = gx * cell + cell / 2;
            const cy = gy * cell + cell / 2;
            const shape = $art.randomElement(SHAPES);
            const size = $art.random(cell * 0.3, cell * 0.92);
            const rot = $art.random(0, TWO_PI);

            fill(color($art.randomElement(palette.colors)));

            push();
            translate(cx, cy);
            rotate(rot);
            if (shape === "rect") {
              rect(0, 0, size, size);
            } else if (shape === "ellipse") {
              ellipse(0, 0, size, size);
            } else {
              const r = size / 2;
              triangle(0, -r, r, r, -r, r);
            }
            pop();
          }
        }

        chosen = { Palette: palette.name, "Grid Size": grid + "x" + grid };

        // ---- mint pipeline: traits + snapshot, AFTER the canvas is drawn ----
        $art.setTraits(chosen);
        $art.snapshot(); // last: signals Cloudflare the render is complete
      }
    </script>
  </body>
</html>
